# 多并发 DNS ，谁快用谁，存在 DNS 泄漏，可能查询错误无法访问，需要刷新。nameserver-policy 直接明文查询
# 某些机场的默认配置+自加DNS

mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: Rule
log-level: info
ipv6: true

hosts:
  services.googleapis.cn: 216.58.200.67
  www.google.cn: 216.58.200.67

external-controller: '0.0.0.0:9090'

clash-for-android:
  append-system-dns: false

profile:
  tracing: true

dns:
  enable: true
  listen: '127.0.0.1:8853'
  default-nameserver:
    - 221.4.66.66         # 广州联通
    - 211.136.192.6       # 广州移动
  nameserver:
    - https://sm2.doh.pub/dns-query  # 腾讯DoH (国密 SM2)
    - 221.4.66.66         # 广州联通
    - 211.136.192.6       # 广州移动
    - 119.29.29.29        # 腾讯
    - 8.8.8.8             # 谷歌
    - 208.67.220.220      # OpenDNS
    - 1.2.4.8             # CNNIC 反污染
    - 8.8.4.4             # 谷歌2
    - 1.1.1.1             # CF
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.4.4/dns-query
  ipv6: true # 可能导致泄漏
  enhanced-mode: fake-ip # 缓存直接用
  fallback-filter: # 这个没啥必要
    geoip: true
    domain:
      - +.google.com
      - +.googleapis.com
      - +.gvt1.com
      - +.youtube.com
      - +.facebook.com
      - +.twitter.com
      - +.tiktok.com
      - +.tiktokv.com

nameserver-policy:
  www.baidu.com: 114.114.114.114
  www.taobao.com: 223.5.5.5
  +.internal.crop.com: 10.0.0.1

fake-ip-filter:
  - '*.lan'
  - 'stun.*.*.*'
  - 'stun.*.*'
  - time.windows.com
  - time.nist.gov
  - time.apple.com
  - '*.ntp.org.cn'
  - '*.openwrt.pool.ntp.org'
  - pool.ntp.org
  - ntp.aliyun.com
  - '*.msftconnecttest.com'
  - '*.msftncsi.com'
  - '*.*.*.srv.nintendo.net'
  - '*.*.stun.playstation.net'
  - 'xbox.*.*.microsoft.com'
  - '*.ipv6.microsoft.com'
  - '*.*.xboxlive.com'
  - speedtest.cros.wr.pvp.net
