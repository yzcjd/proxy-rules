mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: Rule # 似乎必加，才能让国外 DNS 请求走代理
log-level: info
ipv6: false # v6 解析容易产生泄漏
external-controller: 127.0.0.1:9090

profile:
  tracing: true

dns:
  enable: true
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: # 防异常域名（避免 fake-ip 出问题）
    - "*.lan"
    - "*.local"
    - localhost
    - "*.arpa"
    - time.windows.com
    - "*.ntp.org"
    - pool.ntp.org
    - ntp.aliyun.com
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "*.apple.com"
    - "*.icloud.com"
    - "*.microsoft.com"

  default-nameserver: # 仅用于解析 DoH,平时不干活。允许少量泄漏
    - 223.5.5.5
    - 119.29.29.29

  proxy-server-nameserver: # 让国外 DNS 请求走代理，运营商看不到咱的请求。而且要强制 ip 解析避免先使用 default-nameserver 导致泄漏。
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853

  nameserver:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
    - https://dns.google/dns-query

  nameserver-policy: # DNS 分流核心，主要逻辑：国内走直连 DoH（腾讯+阿里），国外走国外 DoH（CF+Google）
    "geosite:cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "+.cn":
      - 223.5.5.5
      - 119.29.29.29
    "+.com.cn":
      - 223.5.5.5
    "+.gov.cn":
      - 223.5.5.5
    "+.org.cn":
      - 223.5.5.5

  fallback: # 污染兜底
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://dns.google:853

  fallback-filter: # 防异常域名（避免 fake-ip 出问题）
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
    domain:
      - "+.google.com"
      - "+.youtube.com"
      - "+.github.com"
      - "+.twitter.com"
      - "+.discord.com"

 # 性能优化
  use-hosts: true
  cache-size: 10000
  prefer-h3: true
